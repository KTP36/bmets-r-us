<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capacitor Quiz (25 Questions) | MedSkillBuilder</title>

<meta name="description" content="Test your knowledge of capacitors, troubleshooting, and multimeter testing with this 25-question quiz.">

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
  background:#f8fafc;
}

.question {
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:16px;
  border:1px solid #e2e8f0;
}

button {
  background:#2563eb;
  color:white;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.result {
  display:none;
  background:#e0f2fe;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>Capacitor Quiz (25 Questions)</h1>

<p>Test your understanding of capacitors, troubleshooting, and multimeter behavior.</p>

<form id="quiz">

<!-- QUESTIONS -->
<div id="questions"></div>

<button type="button" onclick="gradeQuiz()">Submit Quiz</button>

</form>

<div class="result" id="result"></div>

<script>
const questions = [
["What does a capacitor store?","Electrical energy","Heat","Resistance","a"],
["Capacitors store energy in what field?","Magnetic","Electric","Thermal","b"],
["What separates capacitor plates?","Wire","Dielectric","Air only","b"],
["Capacitors in power supplies help?","Increase voltage","Smooth voltage","Stop current","b"],
["Before testing a capacitor?","Turn power on","Discharge it","Increase voltage","b"],
["Why dangerous after power off?","Hold charge","Create voltage","Explode always","a"],
["Resistance rising reading means?","Charging","Shorted","Broken meter","a"],
["Constant zero reading means?","Good","Shorted","Open","b"],
["OL reading may indicate?","Charging","Open","Short","b"],
["Meter applies small?","Current","Voltage","Heat","b"],
["Capacitors oppose change in?","Voltage","Current","Resistance","a"],
["Defibrillators use capacitors to?","Store energy","Filter air","Measure voltage","a"],
["Capacitors block?","DC steady state","AC always","All signals","a"],
["Symbol for capacitance?","F","V","Ω","a"],
["Capacitor unit?","Farad","Volt","Amp","a"],
["Bad capacitor symptom?","Stable voltage","No power","Perfect circuit","b"],
["Testing in circuit can cause?","Accurate results","False readings","No effect","b"],
["Continuity test good for capacitors?","Always","Not ideal","Only method","b"],
["Shorted capacitor shows?","Low resistance","High resistance","OL","a"],
["Charging curve shows?","Increasing resistance","Flat line","Drop to zero","a"],
["Multimeter mode used?","Voltage","Resistance","Current only","b"],
["Capacitor releases energy when?","Charging","Discharging","Idle","b"],
["Capacitors used for filtering?","Yes","No","Rarely","a"],
["Electrolytic capacitors are?","Polarized","Non-polarized","Resistors","a"],
["First troubleshooting step?","Replace everything","Check basics","Ignore issue","b"]
];

const container = document.getElementById("questions");

questions.forEach((q,i)=>{
  let html = `<div class="question"><p>${i+1}. ${q[0]}</p>`;
  ["a","b","c"].forEach((opt,idx)=>{
    html += `<label><input type="radio" name="q${i}" value="${opt}"> ${q[idx+1]}</label><br>`;
  });
  html += "</div>";
  container.innerHTML += html;
});

function gradeQuiz(){
  let score = 0;
  questions.forEach((q,i)=>{
    let ans = document.querySelector(`input[name="q${i}"]:checked`);
    if(ans && ans.value === q[4]) score++;
  });

  const result = document.getElementById("result");
  result.style.display = "block";
  result.innerHTML = `
    <h2>Your Score: ${score} / ${questions.length}</h2>
    <p>${score >= 20 ? "Strong understanding." : score >= 12 ? "Good, but review key concepts." : "Review capacitor basics."}</p>

    <hr>

    <p><strong>Keep learning:</strong></p>
    <ul>
      <li><a href="/how-to-test-a-capacitor.html">How to Test a Capacitor</a></li>
      <li><a href="/what-does-a-capacitor-do.html">What Does a Capacitor Do?</a></li>
      <li><a href="/how-to-use-a-multimeter.html">How to Use a Multimeter</a></li>
      <li><a href="/browse-all-practice.html">Browse All Practice</a></li>
    </ul>
  `;
}
</script>

</body>
</html>
