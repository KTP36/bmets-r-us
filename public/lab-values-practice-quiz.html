<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lab Values Practice Quiz (30 Questions) | MedSkillBuilder</title>

<meta name="description" content="Test your knowledge of normal lab values with this 30-question practice quiz. Includes electrolytes, CBC, ABG basics, and more for nursing and healthcare students.">

<link rel="canonical" href="https://medskillbuilder.com/lab-values-practice-quiz.html">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f8fafc;
  color: #0f172a;
  line-height: 1.6;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 24px 20px 50px;
}

h1 {
  margin-top: 0;
  border-bottom: 4px solid #0ea5e9;
  padding-bottom: 10px;
}

.back-button {
  display: inline-block;
  margin-bottom: 20px;
  padding: 10px 16px;
  background: #dc2626;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
}

.quiz-card,
.score-card {
  background: white;
  border: 1px solid #dbe4ee;
  border-radius: 14px;
  padding: 22px;
  box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
}

.top-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  font-weight: 700;
  color: #0369a1;
}

.progress-bar-wrap {
  width: 100%;
  height: 16px;
  background: #cbd5e1;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 22px;
  border: 1px solid #94a3b8;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #2563eb;
  transition: width 0.25s ease;
}

.question {
  font-size: 20px;
  margin-bottom: 20px;
  font-weight: 700;
  line-height: 1.45;
}

.option {
  display: block;
  background: white;
  padding: 14px 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid #cbd5e1;
  transition: 0.2s ease;
}

.option:hover {
  background: #f8fbff;
  border-color: #94a3b8;
}

.correct {
  background: #d1fae5;
  border-color: #16a34a;
}

.wrong {
  background: #fee2e2;
  border-color: #dc2626;
}

.feedback {
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: 10px;
  font-weight: 700;
}

.feedback.correct {
  background: #dcfce7;
  color: #166534;
}

.feedback.wrong {
  background: #fee2e2;
  color: #991b1b;
}

.explanation {
  margin-top: 8px;
  font-weight: 500;
  color: #334155;
}

.button-row {
  margin-top: 18px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.95;
}

button:disabled {
  opacity: 0.6;
  cursor: default;
}

.secondary-button {
  display: inline-block;
  padding: 10px 16px;
  border-radius: 10px;
  background: #e0f2fe;
  color: #0f172a;
  text-decoration: none;
  font-weight: bold;
  border: 1px solid #bae6fd;
}

.score-big {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 10px;
}

.review-item {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid #e2e8f0;
}

.review-item:first-child {
  margin-top: 0;
  padding-top: 0;
  border-top: none;
}
</style>
</head>

<body>

<div class="container">

<a class="back-button" href="/normal-lab-values-cheat-sheet.html">
  ← Back to Lab Values
</a>

<h1>Lab Values Practice Quiz</h1>

<div class="quiz-card" id="quizCard">
  <div class="top-row">
    <div id="progressText">Question 1 of 10</div>
    <div id="scoreText">Score: 0</div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="quiz"></div>

  <div class="button-row">
    <button id="nextBtn" onclick="nextQuestion()" disabled>Next Question</button>
  </div>
</div>

<div class="score-card" id="scoreCard" style="display:none;">
  <div class="score-big" id="finalScore"></div>
  <p id="finalMessage"></p>

  <div class="button-row">
    <button onclick="restartQuiz()">Retake Quiz</button>
    <a class="secondary-button" href="/normal-lab-values-cheat-sheet.html">Review Lab Values</a>
    <a class="secondary-button" href="/browse-all-practice.html">Browse All Practice Tools</a>
  </div>

  <div id="reviewList" style="margin-top:20px;"></div>
</div>

</div>

<script>
const questions = [
{
question: "What is the normal sodium range?",
options: ["120–130 mEq/L", "135–145 mEq/L", "150–160 mEq/L", "160–170 mEq/L"],
answer: 1,
explanation: "Normal sodium is 135–145 mEq/L."
},
{
question: "Normal potassium level?",
options: ["2.0–3.0", "3.5–5.0", "5.5–6.5", "6.5–7.5"],
answer: 1,
explanation: "Normal potassium is 3.5–5.0 mEq/L."
},
{
question: "Normal calcium range?",
options: ["6–7 mg/dL", "7–8 mg/dL", "8.5–10.5 mg/dL", "11–12 mg/dL"],
answer: 2,
explanation: "Normal calcium is 8.5–10.5 mg/dL."
},
{
question: "Normal glucose (fasting)?",
options: ["40–60", "70–100", "120–150", "150–200"],
answer: 1,
explanation: "Normal fasting glucose is 70–100 mg/dL."
},
{
question: "Normal hemoglobin (adult)?",
options: ["8–10", "10–12", "12–18", "18–22"],
answer: 2,
explanation: "A general adult hemoglobin range is about 12–18 g/dL depending on sex."
},
{
question: "Normal WBC count?",
options: ["1–3k", "4–11k", "12–20k", "20–30k"],
answer: 1,
explanation: "Normal WBC count is about 4,000–11,000 cells/mcL."
},
{
question: "Normal platelets?",
options: ["50–100k", "100–150k", "150–400k", "400–600k"],
answer: 2,
explanation: "A common normal platelet range is 150,000–400,000/mcL."
},
{
question: "Normal creatinine?",
options: ["0.6–1.3", "1.5–2.5", "2.5–3.5", "3.5–4.5"],
answer: 0,
explanation: "Normal creatinine is about 0.6–1.3 mg/dL."
},
{
question: "Normal BUN?",
options: ["5–20", "20–40", "40–60", "60–80"],
answer: 0,
explanation: "Normal BUN is commonly 5–20 mg/dL."
},
{
question: "Normal magnesium?",
options: ["1.5–2.5", "2.5–3.5", "3.5–4.5", "4.5–5.5"],
answer: 0,
explanation: "Normal magnesium is about 1.5–2.5 mEq/L."
}
];

let current = 0;
let score = 0;
let answered = false;
let userAnswers = [];

function loadQuestion() {
  answered = false;
  document.getElementById("nextBtn").disabled = true;

  const q = questions[current];
  document.getElementById("progressText").textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById("scoreText").textContent = `Score: ${score}`;
  document.getElementById("progressBar").style.width = `${((current + 1) / questions.length) * 100}%`;

  let html = `<div class="question">${q.question}</div>`;

  q.options.forEach((opt, i) => {
    html += `<div class="option" onclick="selectAnswer(${i})"><strong>${String.fromCharCode(65 + i)}.</strong> ${opt}</div>`;
  });

  html += `<div id="feedbackWrap"></div>`;
  document.getElementById("quiz").innerHTML = html;
}

function selectAnswer(i) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const options = document.querySelectorAll(".option");
  const isCorrect = i === q.answer;

  options.forEach((el, index) => {
    el.style.pointerEvents = "none";
    if (index === q.answer) el.classList.add("correct");
    if (index === i && i !== q.answer) el.classList.add("wrong");
  });

  if (isCorrect) score++;

  userAnswers.push({
    question: q.question,
    selected: i,
    correct: q.answer,
    options: q.options,
    explanation: q.explanation,
    isCorrect
  });

  document.getElementById("scoreText").textContent = `Score: ${score}`;

  const feedbackWrap = document.getElementById("feedbackWrap");
  feedbackWrap.innerHTML = `
    <div class="feedback ${isCorrect ? "correct" : "wrong"}">
      ${isCorrect ? "Correct!" : `Not quite. Correct answer: ${String.fromCharCode(65 + q.answer)}. ${q.options[q.answer]}`}
      <div class="explanation">${q.explanation}</div>
    </div>
  `;

  document.getElementById("nextBtn").disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
    return;
  }
  loadQuestion();
}

function showResults() {
  document.getElementById("quizCard").style.display = "none";
  document.getElementById("scoreCard").style.display = "block";

  const percent = Math.round((score / questions.length) * 100);
  document.getElementById("finalScore").textContent = `${score} / ${questions.length} (${percent}%)`;

  let message = "";
  if (percent >= 90) {
    message = "Excellent job. You have a strong grasp of these lab values.";
  } else if (percent >= 80) {
    message = "Great work. You understand this material well.";
  } else if (percent >= 70) {
    message = "Good job. Review the missed items and you’ll be even stronger.";
  } else if (percent >= 60) {
    message = "You’re building a foundation. Review the cheat sheet and try again.";
  } else {
    message = "Keep going. Review the lab values page and retake the quiz.";
  }

  document.getElementById("finalMessage").textContent = message;

  const reviewList = document.getElementById("reviewList");
  reviewList.innerHTML = "<h2>Question Review</h2>";

  userAnswers.forEach((item, idx) => {
    reviewList.innerHTML += `
      <div class="review-item">
        <p><strong>Question ${idx + 1}:</strong> ${item.question}</p>
        <p><strong>Your answer:</strong> ${String.fromCharCode(65 + item.selected)}. ${item.options[item.selected]}</p>
        <p><strong>Correct answer:</strong> ${String.fromCharCode(65 + item.correct)}. ${item.options[item.correct]}</p>
        <p><strong>Explanation:</strong> ${item.explanation}</p>
      </div>
    `;
  });
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = false;
  userAnswers = [];
  document.getElementById("quizCard").style.display = "block";
  document.getElementById("scoreCard").style.display = "none";
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
